name: goride_driver
description: "GoRide - App do Motorista"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  flutter_local_notifications: ^18.0.1  

  # UI
  cupertino_icons: ^1.0.8

  # HTTP / Storage
  dio: ^5.9.2
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

  # Navegação
  go_router: ^17.1.0

  # State
  provider: ^6.1.5+1

  # Mapas / Localização
  google_maps_flutter: ^2.15.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1

  # Imagens
  cached_network_image: ^3.4.1
  image_picker: ^1.2.1

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_messaging: ^15.1.3

  # WebSocket (Reverb)
  web_socket_channel: ^3.0.1

  flutter_dotenv: ^5.1.0   # Ponto 1+2 — variáveis de ambiente
    

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

assets:
     - .env 